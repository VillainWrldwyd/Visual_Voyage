<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Voyager Indicators Strategies</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@1.1.0/dist/chartjs-plugin-annotation.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/ldrs/dist/auto/ldrs.min.js"></script>
  </head>
  <body>
    <!-- Loader -->
    <div id="loader">
      <div class="spinner"></div>
    </div>

    <!-- Main Content -->
    <div class="banner">
      <div class="content">
        <section class="link-aria">
          <!--Welcome-->
          <div class="site-links">
            <h3>Welcome to Voyage Voyage</h3>
            <p>You Vision, Our Voyage.</p>
          </div>

          <!--Voyager Arts & Design-->
          <div class="sitelinks link-card skeleton">
            <a href="voyagerArt.html">
              <i class="fas fa-palette"></i>
              <h3>Voyager Art & Design</h3>
            </a>
            <p>Galactic inspired artwork.</p>
          </div>

          <!-- Voyager IS -->
          <div class="sitelinks link-card skeleton">
            <a href="voyagerIS.html">
              <i class="fas fa-chart-line"></i>
              <h3>Voyager Indicators/ Strategies</h3>
            </a>
            <p>Indicators & Strategies.</p>
          </div>

          <!-- Trader tracker  {Update loader later}-->
          <div class="sitelinks link-card skeleton">
            <a href="tradeTracker.html">
              <i class="fas fa-link"></i>
              <h3>Voyager Trade Tracker</h3>
            </a>
            <p>Track your trades in real-time.</p>
          </div>
        </section>

    </div>

    <!-- JavaScripts -->
    <script>
      // Smooth scroll for nav links
      document.querySelectorAll("nav a").forEach((anchor) => {
        anchor.addEventListener("click", function (e) {
          e.preventDefault();
          document
            .querySelector(this.getAttribute("href"))
            .scrollIntoView({ behavior: "smooth" });
        });
      });
      //*

      // Initialize first slide
      document.addEventListener("DOMContentLoaded", () => {
        showSlide(currentSlide);
      });

      // Loader hide on page load
      window.addEventListener("load", () => {
        document.getElementById("loader").style.display = "none";
      });

      // Remove skeleton after loading
      window.addEventListener("load", () => {
        document.querySelectorAll(".skeleton").forEach((el) => {
          el.classList.remove("skeleton");
        });
      });

      // Initialize first slide
      showSlide(currentSlide);
      //*

      // Nav Toggle -->

      const menuToggle = document.getElementById("menu-toggle");
      const sideNav = document.getElementById("side-nav");

      menuToggle.addEventListener("click", () => {
        sideNav.classList.toggle("active");
      });
      //*

      // Loader toggle for section
      setTimeout(() => {
        document.getElementById("section-loader").style.display = "";
        document.getElementById("section-content").style.display = "";
      }, 3000); // simulate delay

      // Helix loader
      const loader = document.getElementById("loadingScreen");
      if (loader) {
        loader.style.display = "none";
      }

      function showLoader() {
        document.getElementById("loadingScreen").style.display = "flex";
      }

      function hideLoader() {
        document.getElementById("loadingScreen").style.display = "none";
      }

      function showSlide(index) {
        console.log("Showing slide", index);
      }

      // Example usage:
      showLoader();
      loadTrades().then(() => hideLoader());
    </script>
  </body>
</html>
